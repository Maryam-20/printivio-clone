{% extends "common.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container my-2 col-10 col-md-4 border p-3 rounded mt-5">
    <h3 class="text-center">Sign In</h3>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-dark w-100">Sign In</button>
    </form>
</div>
{% endblock content %}
